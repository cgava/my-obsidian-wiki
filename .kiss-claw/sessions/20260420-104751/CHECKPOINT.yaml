why: |
  Raison profonde : contrainte externe — pas de droits sur le repo amont obsidian-wiki + besoin de survivre aux git pull du vendor sans perdre les corrections locales. Secondairement, compliance dual-zone (s0 public / s2 privé) reste en arrière-plan comme justification du besoin initial, mais le moteur du besoin actuel est le verrou upstream.
  Catégorie : contrainte_externe
raw: |
  Je ne peux pas fork le projet distant, donc il faut me faire un script de patch, qui va me permettre, pour chaque anomalie de :
  - vérifier si l anomalie est encore présente (en totalité, ou en partie, quand cela s applique à plusieurs fichiers)
  - de choisir si j applique ou pas le patch
  Je veux une solution versatile : pour pouvoir ajouter des corrections d anomalies, ou en enlever facilement... avec des paramètres à l état de l art
  il faut chercher l état de l art de ce genre de besoins, qui doit être récurrent chez des packagers de solutions (style distrib open source)
  Le script de patch ou ses fichiers de configuration associés, doivent également contenir la description complète de l anomalie, afin de pouvoir comprendre de quoi il s agit
elicited: |
  Scope verrouillé : vendor-only (pas les anomalies locales knlg-repo, pas les phases 5-6 originales).
  Système de patches inspiré distro packagers (quilt/DEP-3/etc.) — recherche état de l art incluse comme Phase 1 du plan.
  Chaque patch : self-documenting, détection par état (clean/patched/partial/dirty), interactif, réversible, versatile.
  Pilote choisi : anomalie B3 (vendor/.env) — simple, single file, haut impact.
constraints: |
  - Pas de fork upstream — corrections locales uniquement (knlg-repo/)
  - Stack techno : bash + Python (stdlib + JSON) par défaut ; paquet pip/apt propre OK sans demander ; exotique = confirmation
  - Self-documenting : description complète par patch
  - Idempotent avec détection partielle multi-fichiers
  - Interactif par défaut, batch via flag explicite
  - Versatile : ajout/retrait patch = édition registre, pas du moteur
  - Réversible : rollback par patch
  - Survie aux git pull vendor : re-detect + re-apply
  - Mono-vendor pour l instant (extensibilité = bonus)
